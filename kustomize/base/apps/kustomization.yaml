---
# Base ArgoCD Application definitions, one per example workload.
#
# Each Application references a real, pinned, third-party Helm chart directly
# from its `source.helm` block. Workloads are added here incrementally; the
# dev/prod overlays patch these definitions per environment.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - podinfo.yaml
  - httpbin.yaml
  - guestbook.yaml
