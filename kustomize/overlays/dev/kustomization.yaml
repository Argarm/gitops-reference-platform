---
# Development overlay.
#
# References the platform base and patches each ArgoCD Application for the dev
# environment: low replica counts, small resource limits and
# `*.dev.example.com` ingress hosts.
#
# Naming: `nameSuffix` gives every Application a `-dev` suffix so dev and prod
# Applications never collide in the argocd namespace. kustomize intentionally
# does NOT suffix Namespace names, so the namespaces are renamed explicitly via
# JSON6902 patches below (kept in sync with each Application's destination).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -dev

# Tag every resource with its environment (not applied to selectors).
labels:
  - pairs:
      app.kubernetes.io/environment: dev
    includeSelectors: false

patches:
  # Per-application environment patches (matched by pre-suffix base name).
  - path: patches/podinfo.yaml
  - path: patches/httpbin.yaml
  - path: patches/guestbook.yaml
  # Rename platform namespaces for this environment.
  - target:
      kind: Namespace
      name: podinfo
    patch: |-
      - op: replace
        path: /metadata/name
        value: podinfo-dev
  - target:
      kind: Namespace
      name: httpbin
    patch: |-
      - op: replace
        path: /metadata/name
        value: httpbin-dev
  - target:
      kind: Namespace
      name: guestbook
    patch: |-
      - op: replace
        path: /metadata/name
        value: guestbook-dev
