---
# prod: three replicas, larger limits, production ingress host.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo
  namespace: argocd
spec:
  destination:
    namespace: podinfo-prod
  source:
    helm:
      valuesObject:
        replicaCount: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: podinfo.example.com
              paths:
                - path: /
                  pathType: ImplementationSpecific
